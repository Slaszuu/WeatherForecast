name: bartek-weatherforecast-api

services:
  weatherforecast:
    user: "1000:1000"
    restart: always
    ports:
      - 1390:5125
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5125
      - ConnectionStrings__DefaultConnection=Server=database;Port=5432;User Id=${DATABASE_USERNAME};Password=${DATABASE_PASSWORD};
      - CORS_ORIGINS=${CORS_ORIGINS}
      - RUN_MIGRATION=${RUN_MIGRATION}
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

  database:
    image: "postgres:18"
    restart: always
    ports:
      - 4737:5432
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: postgres
    env_file:
     - .env
    volumes:
      - ${DATABASE_VOLUME_LOCATION}:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5


  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - weatherforecast